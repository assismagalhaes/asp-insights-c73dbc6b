name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript, build and Python
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-scraper-api.txt

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -r requirements-scraper-api.txt

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Production build
        run: bun run build

      - name: Python tests
        run: python -m unittest discover -s tests -p "test_*.py"

  sql-smoke:
    name: Protected Supabase SQL smoke
    if: ${{ vars.RUN_SUPABASE_SQL_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: supabase-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run transactional smoke tests
        env:
          SUPABASE_TEST_DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}
        run: |
          set -euo pipefail
          for file in supabase/tests/*_smoke.sql; do
            psql "$SUPABASE_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          done
